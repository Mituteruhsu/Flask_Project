{% extends "base.html" %}
{% block title %}登入 - 發票辨識系統{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm mt-4">
            <div class="card-body p-4">
                <h4 class="card-title mb-4 text-center">登入</h4>
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">帳號 / Email</label>
                        <input type="text" name="identifier" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密碼</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="form-check mb-3">
                        <input type="checkbox" name="remember" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">記住我</label>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">登入</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
