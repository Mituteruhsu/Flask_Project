<!-- /templates/confirm.html -->
{% extends 'base.html' %}

{% block title %}確認發票資料{% endblock %}

{% block content %}
<div class="mb-4">
    <h4 class="mb-0">📝 確認發票資料</h4>
    <p class="text-muted small mt-1">請檢查並確認以下資訊無誤後送出</p>
</div>

<form method="post" id="confirmForm">
    <div class="row g-4">
        <!-- 左側：發票資訊 -->
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-receipt"></i> 發票資訊
                    </h5>
                </div>
                <div class="card-body text-white">
                    <div class="alert alert-secondary mb-0" role="alert">
                        發票資訊會由辨識流程回傳，這裡可後續接上表單欄位。
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 右側：品項明細 -->
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-list-ul"></i> 品項明細
                    </h5>
                </div>
                <div class="card-body">
                    <div id="itemsList">
                        <!-- 由 JS 動態填充 -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 操作按鈕 -->
    <div class="d-flex gap-2 justify-content-end mt-4">
        <a href="{{ url_for('upload_view') }}" class="btn btn-secondary btn-lg">
            <i class="bi bi-x-circle"></i> 取消
        </a>
        <button type="submit" class="btn btn-primary btn-lg">
            <i class="bi bi-check-circle"></i> 確認送出
        </button>
    </div>
</form>
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/form-handler.js') }}"></script>
{% endblock %}
