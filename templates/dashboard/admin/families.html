{% extends "base.html" %}
{% block title %}家庭管理{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>家庭管理</h3>
    <a href="{{ url_for('dashboard.admin_index') }}" class="btn btn-outline-secondary btn-sm">返回總覽</a>
</div>

<table class="table table-hover align-middle">
    <thead>
        <tr>
            <th>ID</th>
            <th>家庭名稱</th>
            <th>方案</th>
            <th>成員數</th>
            <th class="text-end">操作</th>
        </tr>
    </thead>
    <tbody>
        {% for family in families %}
        <tr>
            <td>{{ family.id }}</td>
            <td>{{ family.name }}</td>
            <td>{{ family.plan.name if family.plan else "未設定" }}</td>
            <td>{{ family.members|length }}</td>
            <td class="text-end">
                <form method="POST" action="{{ url_for('dashboard.admin_delete_family', family_id=family.id) }}"
                      onsubmit="return confirm('確定要刪除家庭「{{ family.name }}」嗎？將一併刪除所有成員關聯，此動作無法復原。');" class="d-inline">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="btn btn-outline-danger btn-sm">刪除</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
